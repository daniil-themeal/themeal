name: Vercel Production Deploy

# Production branch on Vercel: feature/next (see project Environments → Production).
# Deploy hook must target feature/next — secret VERCEL_DEPLOY_HOOK = feature-next-prod hook.

on:
  push:
    branches:
      - feature/next
    paths-ignore:
      - "telegram-cursor-bot/**"
      - ".github/**"
      - "**/*.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy (feature/next)
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
