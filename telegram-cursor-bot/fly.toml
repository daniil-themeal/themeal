# Fly.io — alternative to Render/Railway
# Install: https://fly.io/docs/flyctl/install/
# Deploy: cd telegram-cursor-bot && fly launch && fly secrets set ...

app = "themeal-telegram-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  AGENT_MODE = "cloud"
  CLOUD_REPO_URL = "https://github.com/daniil-themeal/themeal.git"
  CLOUD_REPO_REF = "feature/next"
  CURSOR_MODEL = "composer-2.5"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
